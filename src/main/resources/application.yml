spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    com.devansh: debug

JWT_SECRET_KEY: ${JWT_SECRET_KEY}
FRONTEND_URL: ${FRONTEND_URL}